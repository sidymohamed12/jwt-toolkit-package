name: Release

# Déclenché par un tag "v1.2.3" (cohérent avec la version du pom.xml racine).
# Publie en une seule commande vers :
#   - Maven Central (profil "release" -> central-publishing-maven-plugin)
#   - GitHub Packages (distributionManagement du pom.xml racine, actif par défaut)
#
# Secrets requis dans Settings > Secrets and variables > Actions :
#   CENTRAL_USERNAME / CENTRAL_PASSWORD  -> token du Central Publisher Portal (central.sonatype.com)
#   GPG_PRIVATE_KEY                       -> clé privée GPG exportée en ASCII armor (gpg --export-secret-keys --armor)
#   GPG_PASSPHRASE                        -> passphrase de cette clé
# GitHub Packages utilise le GITHUB_TOKEN fourni automatiquement par Actions
# (aucun secret à créer), grâce au bloc "permissions" ci-dessous.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Écrire ~/.m2/settings.xml (Central + GitHub Packages + passphrase GPG)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'SETTINGS_EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>central</id>
                <username>${env.CENTRAL_USERNAME}</username>
                <password>${env.CENTRAL_PASSWORD}</password>
              </server>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GH_TOKEN}</password>
              </server>
              <server>
                <id>gpg.passphrase</id>
                <passphrase>${env.GPG_PASSPHRASE}</passphrase>
              </server>
            </servers>
          </settings>
          SETTINGS_EOF

      - name: Build, tester et publier (Maven Central + GitHub Packages)
        run: mvn -B -ntp -P release clean deploy
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
